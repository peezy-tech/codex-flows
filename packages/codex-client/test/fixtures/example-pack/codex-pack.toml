[pack]
name = "engineering-capabilities"
version = "0.1.0"
description = "Reusable engineering skills, flows, plugins, and hooks."

[[pack.items]]
name = "tdd"
kind = "skill"
path = "skills/engineering/tdd"

[[pack.items]]
name = "release-health"
kind = "flow"
path = "flows/release-health"

[[pack.items]]
name = "repo-policy"
kind = "plugin"
path = "plugins/repo-policy"

[[pack.items]]
name = "workspace-stop"
kind = "hook"
path = "hooks/workspace-stop"
